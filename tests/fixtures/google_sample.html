<script>AF_initDataCallback({key: 'ds:1', hash: '2', data:[[["140245524367188678", "Student Researcher, BS/MS, Winter/Summer 2026", "https://www.google.com/about/careers/applications/signin?jobId=CiUAL2FckTl3i0Kg9bm5-cwU_unEJ4immCkcmZEzsgvd7IwvbipLEjsAbDj5iIwSGTQMJEawk9aCtA9M1kBY7mUyJ58Qj5QSMtYgdTolThXSMDFsvF1G1pKNBvg-0csRwwwkTQ%3D%3D_V2&loc=US&title=Student+Researcher", [null, "<ul>\n<li>Participate in research to develop solutions for real-world, large-scale problems.</li>\n</ul>"], [null, "<h3>Minimum qualifications:</h3><ul>\n<li>Currently enrolled in a Bachelor's or Master’s degree in Computer Science, Linguistics, Statistics, Biostatistics, Applied Mathematics, Operations Research, Economics, Natural Sciences, or related technical field.<br></li>\n<li>Experience in one area of computer science (e.g., Natural Language Understanding, Human Computer Interactions, Computer Vision, Machine Learning, Deep Learning, Algorithmic Foundations of Optimization, Quantum Information Science, Data Science, Software Engineering, or similar areas).<br></li>\n</ul><br><h3>Preferred qualifications:</h3><ul>\n<li>Currently enrolled in a full-time degree program and returning to the program after completion of the internship.<br></li>\n<li>Currently attending a degree program in the United States.<br></li>\n<li>Experience as a researcher, including internships, full-time, or at a lab.<br></li>\n<li>Experience contributing research communities or efforts, including publishing papers in major conferences or journals.<br></li>\n<li>Experience with one or more general purpose programming languages (e.g., Python, Java, JavaScript, C/C++, etc.).<br></li>\n</ul>"], "projects/gweb-careers-proto/tenants/60107626-8e00-0000-0000-0071646e0806/companies/ebbbf0d1-8121-483c-8f99-ee92597591fc", null, "Google", "en-US", [["Mountain View, CA, USA", ["Google Building 41, 1600 Amphitheatre Pkwy #43, Mountain View, CA 94043, USA"], "Mountain View", "94043", "CA", "US"], ["Ann Arbor, MI, USA", ["Ann Arbor, MI, USA"], "Ann Arbor", null, "MI", "US"], ["Atlanta, GA, USA", ["Atlanta, GA, USA"], "Atlanta", null, "GA", "US"], ["Austin, TX, USA", ["Austin, TX, USA"], "Austin", null, "TX", "US"], ["Cambridge, MA, USA", ["Cambridge, MA, USA"], "Cambridge", null, "MA", "US"], ["Chicago, IL, USA", ["Chicago, IL, USA"], "Chicago", null, "IL", "US"], ["Irvine, CA, USA", ["Irvine, CA, USA"], "Irvine", null, "CA", "US"], ["Kirkland, WA, USA", ["Kirkland, WA, USA"], "Kirkland", null, "WA", "US"], ["Los Angeles, CA, USA", ["Los Angeles, CA, USA"], "Los Angeles", null, "CA", "US"], ["Madison, WI, USA", ["Madison, WI, USA"], "Madison", null, "WI", "US"], ["New York, NY, USA", ["New York, NY, USA"], "New York", null, "NY", "US"], ["Palo Alto, CA, USA", ["Palo Alto, CA, USA"], "Palo Alto", null, "CA", "US"], ["Pittsburgh, PA, USA", ["Pittsburgh, PA, USA"], "Pittsburgh", null, "PA", "US"], ["San Bruno, CA, USA", ["San Bruno, CA, USA"], "San Bruno", null, "CA", "US"], ["Seattle, WA, USA", ["Seattle, WA, USA"], "Seattle", null, "WA", "US"], ["San Francisco, CA, USA", ["San Francisco, CA, USA"], "San Francisco", null, "CA", "US"], ["Sunnyvale, CA, USA", ["Sunnyvale, CA, USA"], "Sunnyvale", null, "CA", "US"], ["Washington D.C., DC, USA", ["Washington, DC, USA"], "Washington", null, "DC", "US"], ["Princeton, NJ, USA", ["Princeton, NJ, USA"], "Princeton", null, "NJ", "US"]], [null, "<p>The Student Researcher Program fosters academic collaborations by hiring students onto research projects aligned to company priorities in scientific advancement. The program offers placements on teams across Google, for research, engineering, and science roles. As a Student Researcher, you will have the opportunity to participate in research projects focused on developing solutions for real-world, large-scale problems.</p><p>Student Researcher projects are exploratory and experiences that drive scientific advancement across a multitude of research areas. Students will work collaboratively on projects that explore innovative research challenges and support the creation of breakthrough technologies.</p><p>Projects vary in duration and location based on team and student requirements. It is required that you are located in one of the specific country locations identified for this role for the full duration of the engagement. When you apply, you will be considered for Student Researcher positions across all of Google's research teams including Google DeepMind, Google Research, Google Cloud and more. This allows us to find the right project match for your skills and interests.</p>\n<p>Researchers across Google are working to advance the state of the art in computing and build the next generation of intelligent systems for all Google products. To achieve this, we invest in foundational research and work on projects that utilize the latest computer science techniques developed by skilled software developers and research scientists. Whether we're shaping the future of sustainability, optimizing algorithms, or pioneering AI systems, our teams strive to continuously progress science, advance society, and improve the lives of billions of people.<br><br></p>\n<p>Individual pay is determined by factors including job-related skills, experience, and relevant education or training. </p><p>US: $98000 - $131000 (USD)</p><p>Learn more about <a href=\"https://www.google.com/about/careers/applications/benefits/\" target=\"_blank\">benefits at Google</a>.</p>"], [3, 2], [1759155085, 860000000], [1781550498, 4000000], [1781550498, 353000000], [null, "<p>Applications will be reviewed on a rolling basis and it’s in the applicant’s best interest to apply early. The anticipated application window is open until <b>July 17, 2026</b>, but may close earlier if all available projects are full. Applications submitted after the application window or once role is closed/projects are full will not be considered.</p><p>Participation in this program requires that you are located in the United States for the duration of the engagement.</p><p>This opportunity is intended for students who are pursuing a Bachelor's or Master’s degree program in Computer Science or a related field. Our Student Researcher opportunities are flexible in time commitment, length of opportunity, and onsite/remote nature, depending on the specific project and host needs. Start dates for this role are typically January through July.</p><p>This program is best suited for students who will not be seeking full time employment following this role, as this program is non-conversion eligible.</p><p>Google is a global company and, in order to facilitate efficient collaboration and communication globally, English proficiency is a requirement for this internship program.<br></p><p>To start the application process, you will need an updated CV or resume and a current unofficial or official transcript in English (PDFs preferred).</p><p><b>Please ensure your anticipated graduation dates (in MM/YY) and any proficiency in coding languages are listed on the resume.</b></p><p>Applicants in the County of Los Angeles: Qualified applications with arrest or conviction records will be considered for employment in accordance with the Los Angeles County Fair Chance Ordinance for Employers and the California Fair Chance Act.</p><p>Applicants in San Francisco: Qualified applications with arrest or conviction records will be considered for employment in accordance with the San Francisco Fair Chance Ordinance for Employers and the California Fair Chance Act.</p><p>In accordance with Washington state law, we are highlighting our comprehensive benefits package, which is available to all eligible US based employees. Benefits for this role include:</p><div><ul><li>Health, dental, vision, life, disability insurance</li><li>Retirement Benefits: 401(k) with company match</li><li>Paid Time Off: 20 days of vacation per year, accruing at a rate of 6.15 hours per pay period for the first five years of employment</li><li>Sick Time: 40 hours/year (increased to 69 hours/year for Seattle) including 5 discretionary sick days per instance</li><li>Maternity Leave (Short-Term Disability + Baby Bonding): 28-30 weeks</li><li>Baby Bonding Leave: 18 weeks</li><li>Holidays: 13 paid days per year</li></ul></div>"], null, null, [null, "Note: By applying to this position you will have an opportunity to share your preferred working location from the following: <b>Mountain View, CA, USA; Ann Arbor, MI, USA; Atlanta, GA, USA; Austin, TX, USA; Cambridge, MA, USA; Chicago, IL, USA; Irvine, CA, USA; Kirkland, WA, USA; Los Angeles, CA, USA; Madison, WI, USA; New York, NY, USA; Palo Alto, CA, USA; Pittsburgh, PA, USA; San Bruno, CA, USA; Seattle, WA, USA; San Francisco, CA, USA; Sunnyvale, CA, USA; Washington D.C., DC, USA; Princeton, NJ, USA</b>."], [null, "<ul>\n<li>Currently enrolled in a Bachelor's or Master’s degree in Computer Science, Linguistics, Statistics, Biostatistics, Applied Mathematics, Operations Research, Economics, Natural Sciences, or related technical field.<br></li>\n<li>Experience in one area of computer science (e.g., Natural Language Understanding, Human Computer Interactions, Computer Vision, Machine Learning, Deep Learning, Algorithmic Foundations of Optimization, Quantum Information Science, Data Science, Software Engineering, or similar areas).<br></li>\n</ul>"], 5], ["138205674881327814", "Advertising Solutions Architect, gTech, gReach Program for People with Disabilities (残障人士岗位) (English, Mandarin)", "https://www.google.com/about/careers/applications/signin?jobId=CiUAL2FckfQwGHF8LlPGgHtu1jYpu4_zjqr4BhYeN4t2KSNf_HAfEjsACxwdTHHanDygof3yNeYn5Ud1WscSnlIXV9o7hvD9D547XTo-WswTh0jJhjaJv9ppZ6YD1CyNO9pi1A%3D%3D_V2&loc=CN&title=Advertising+Solutions+Architect", [null, "<ul>\n<li>Work with clients and internal stakeholders to realize business goals in market.</li>\n<li>Work with sales to identify and develop new business opportunities.</li>\n<li>Understand requirements, and provide best practices and technical solutions around applying ad products and technologies.</li>\n<li>Identify and solve client problems proactively and creatively through effective project management and technical consultation.</li>\n</ul>"], [null, "<h3>Minimum qualifications:</h3><ul>\n<li>Experience with computer science (e.g., database, web/app technology).</li>\n<li>Ability to communicate in English and Mandarin fluently to collaborate with colleagues and complete tasks and projects.</li>\n</ul><br><h3>Preferred qualifications:</h3><ul>\n<li>Experience in a customer-facing role with product implementations, digital ad operations, or technical sales.</li>\n<li>Knowledge of databases with the ability to construct complex SQL queries.<br></li>\n<li>Ability to absorb complex technical concepts and communicate them to a non-technical audience effectively.<br></li>\n<li>Ability to code with Java or Python.<br></li>\n<li>Ability to work separately and manage multiple projects simultaneously.</li>\n<li>Excellent problem-solving, investigative, and project management skills.</li>\n</ul>"], "projects/gweb-careers-proto/tenants/60107626-8e00-0000-0000-0071646e0806/companies/ebbbf0d1-8121-483c-8f99-ee92597591fc", null, "Google", "en-US", [["Beijing, China", ["Beijing, China"], "Beijing", null, "Beijing", "CN"], ["Shanghai, China", ["Shanghai, China"], "Shanghai", null, "Shanghai", "CN"]], [null, "<p>gTech Ads is responsible for all support and media and technical services for  customers big and small across our entire Ad products stack. We help our  customers get the most out of our Ad and Publisher products and guide them when they need help. We provide a range of services from enabling better self help and in-product support, to providing better support through interactions, setting up accounts and implementing ad campaigns, and providing media solutions for customers business and marketing needs and providing complex technical and measurement solutions along with consultative support for our large customers. These solutions range from bespoke and customized ones for our customers to scalable support for millions of customers worldwide. Based on the evolving needs of our ads customers, we partner with Sales, Product and Engineering teams within Google to develop better solutions, tools, and services to improve our products and enhance our client experience. As a cross-functional and global team, we ensure our customers get the best return on investment with Google and we remain a trusted partner.<br></p>\n<div>The gReach Program is a 12-month paid upskilling program for students and industry professionals with disabilities and vocations that support applicants with a Chinese government-issued certificate. You'll receive on-the-job training and work on a range of projects. As a gReach Associate, you'll be placed in teams across the business, such as Device and Services, Software, Advertising Sales, User Support, Market HR, and Google Cloud.</div><p>Google creates products and services that make the world a better place, and gTech’s role is to help bring them to life. Our teams of trusted advisors support customers globally. Our solutions are rooted in our technical skill, product expertise, and a thorough understanding of our customers’ complex needs. Whether the answer is a bespoke solution to solve a unique problem, or a new tool that can scale across Google, everything we do aims to ensure our customers benefit from the full potential of Google products.<br><br>To learn more about gTech, check out our <a href=\"https://www.youtube.com/watch?v=HcjR6ZngQcw\">video</a>.</p>"], null, [1774281677, 181000000], [1774605624, 102000000], [1774605624, 309000000], [null, "Google welcomes people with disabilities. <div><br></div><div>This role is exclusively for people with disabilities. 本职位专为残障求职者招募使用</div>"], null, null, [null, "Note: By applying to this position you will have an opportunity to share your preferred working location from the following: <b>Beijing, China; Shanghai, China</b>."], [null, "<ul>\n<li>Experience with computer science (e.g., database, web/app technology).</li>\n<li>Ability to communicate in English and Mandarin fluently to collaborate with colleagues and complete tasks and projects.</li>\n</ul>"], 1]]]});</script>
